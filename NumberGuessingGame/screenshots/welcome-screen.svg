<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect width="100%" height="100%" fill="#1a1a1a"/>
  <style>
    text {
      font-family: Consolas, "Courier New", monospace;
      font-size: 20px;
      fill: #e5e7eb;
    }
  </style>
  <g xml:space="preserve">
    <text x="24" y="36">============================================================</text>
    <text x="24" y="68">Welcome to the Number Guessing Game</text>
    <text x="24" y="100">============================================================</text>
    <text x="24" y="154">Rules:</text>
    <text x="24" y="186">1. Guess the number selected by the computer.</text>
    <text x="24" y="218">2. The number will always be between 1 and 100.</text>
    <text x="24" y="250">3. You will receive hints after every guess.</text>
    <text x="24" y="282">4. Your score depends on how quickly you guess the answer.</text>
    <text x="24" y="344">Good luck and enjoy the game!</text>
    <text x="24" y="376">============================================================</text>
    <text x="24" y="444">============================================================</text>
    <text x="24" y="486">New Round Started</text>
    <text x="24" y="518">============================================================</text>
    <text x="24" y="562">I have selected a number between 1 and 100.</text>
    <text x="24" y="594">Try to guess it in as few attempts as possible.</text>
    <text x="24" y="666">Enter your guess (1-100):</text>
  </g>
</svg>