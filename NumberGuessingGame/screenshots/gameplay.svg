<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1040" viewBox="0 0 1280 1040">
  <rect width="100%" height="100%" fill="#1a1a1a"/>
  <style>
    text {
      font-family: Consolas, "Courier New", monospace;
      font-size: 20px;
      fill: #e5e7eb;
    }
  </style>
  <g xml:space="preserve">
    <text x="24" y="36">Good luck and enjoy the game!</text>
    <text x="24" y="68">============================================================</text>
    <text x="24" y="132">============================================================</text>
    <text x="24" y="172">New Round Started</text>
    <text x="24" y="204">============================================================</text>
    <text x="24" y="250">I have selected a number between 1 and 100.</text>
    <text x="24" y="282">Try to guess it in as few attempts as possible.</text>
    <text x="24" y="344">Enter your guess (1-100): 50</text>
    <text x="24" y="374">Too high. Try a lower number.</text>
    <text x="24" y="406">Enter your guess (1-100): 25</text>
    <text x="24" y="436">Too low. Try a higher number.</text>
    <text x="24" y="468">Enter your guess (1-100): 35</text>
    <text x="24" y="498">Too low. Try a higher number.</text>
    <text x="24" y="530">Enter your guess (1-100): 45</text>
    <text x="24" y="560">Too low. Try a higher number.</text>
    <text x="24" y="592">Enter your guess (1-100): 48</text>
    <text x="24" y="658">Correct! You guessed the number 48.</text>
    <text x="24" y="720">============================================================</text>
    <text x="24" y="760">Round Summary</text>
    <text x="24" y="792">============================================================</text>
    <text x="24" y="830">Attempts used : 5</text>
    <text x="24" y="860">Score         : 60</text>
    <text x="24" y="890">Performance   : Good</text>
    <text x="24" y="922">============================================================</text>
    <text x="24" y="980">Do you want to play again? (Y/N):</text>
